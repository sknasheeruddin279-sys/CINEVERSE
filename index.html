<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CINEVERSE Login</title>

<link rel="stylesheet"
href="login.css">

</head>

<body>

<video autoplay muted loop playsinline id="bg-video">

<source src="bg.mp4"
type="video/mp4">

</video>

<div class="overlay">

<div class="login-box">

<h1>CINEVERSE</h1>

<p class="subtitle">

Unlimited Movies & Entertainment

</p>

<input
type="text"

placeholder="Username"

id="username">

<input
type="password"

placeholder="Password"

id="password">

<button onclick="login()">

Login

</button>

<p id="message"></p>

<p class="signup-text">

Don't have an account?

<a href="signup.html">

Signup

</a>

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
