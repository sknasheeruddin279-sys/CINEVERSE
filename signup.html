<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CINEVERSE Signup</title>

<link rel="stylesheet"
href="login.css">

</head>

<body>

<video autoplay muted loop id="bg-video">

<source src="bg.mp4"
type="video/mp4">

</video>

<div class="overlay">

<div class="login-box">

<h1>CINEVERSE</h1>

<p class="subtitle">

Create Your Account

</p>

<input
type="text"

placeholder="Create Username"

id="newUsername">

<input
type="password"

placeholder="Create Password"

id="newPassword">

<input
type="password"

placeholder="Confirm Password"

id="confirmPassword">


<label class="show-pass">

<input
type="checkbox"

onclick="toggleSignupPassword()">

Show Password 

</label>

<button onclick="signup()">

Signup

</button>

<p id="message"></p>

<p class="signup-text">

Already have an account?

<a href="index.html">

Login

</a>

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
